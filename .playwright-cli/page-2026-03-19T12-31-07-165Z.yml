    - separator [ref=e67]
    - heading "Abstract" [level=2] [ref=e68]
    - paragraph [ref=e69]:
      - text: Information determines more than ever today's stock markets; this is even more true for new technologies like blockchain based crypto currencies (bitcoin, ether, litecoin, etc).
      - text: While it is certain that these currencies and technologies will be ubiquitous in the future, their potential is yet to be fully understood.
      - text: There is a lot of uncertainty about the impact and value they will have and their exact worth. This is also reflected in the high volatility and large price drops / peaks of bitcoin, ether, litecoin and alike.
      - text: The main driver for the value of these crypto currencies is their market capitalization (distribution), their adaptation by large corporations and banks, their security, their features, etc.
      - text: All this information can be publicly found online. It is just shattered around hundreds of websites, twitter, rss feeds and cluttered with a ton of other, useless information. Big data and machine learning techniques like deep learning can be used to filter out the noise and help predict changes.
    - paragraph [ref=e70]: Kraken/AI uses a combination of data mining (Kraken) and machine learning techniques (AI) to analyze stock behavior. This is not to be confused with high frequency trading, simple sentiment analysis or trading bots.
    - paragraph [ref=e71]: The utilized methods do not rely on superior connection, speed or quality of information. Instead, a variety of heterogeneous raw sources with thousands of data points are combined into multiple massive prediction schemes.
    - paragraph [ref=e72]:
      - text: Kraken/AI cannot predict or forecast stock development; instead it identifies points in time that represent a high statistical correlation to a course change within a defined time span.
      - text: The combination of several classifiers, time spans and course deltas can be used to further minimize uncertainty / statistical error.
  - generic [ref=e76]:
    - heading "Kraken" [level=2] [ref=e77]
    - paragraph [ref=e78]: Kraken collects big data from multiple sources, similar to a human analyst, but in a much broader and parallel approach. The data is gathered asynchronously and massively parallel from hundreds of heterogeneous sources.
    - paragraph [ref=e79]: All gathered data is non proprietary and freely available on the net, like public APIs or RSS / twitter feeds. Kraken can distinguish and handle multiple languages and data formats.
    - paragraph [ref=e80]: The data is then normalized and roughly structured, but not further filtered or biased. Instead, the raw amount of data builds a basis for model creation and statistical analysis.
  - generic [ref=e84]:
    - heading "AI / Artificial Intelligence" [level=2] [ref=e85]
    - heading "idea:" [level=4] [ref=e86]
    - paragraph [ref=e87]: To have a program that allows a user to predict the future value of a resource based on the monitoring of different sources of textual information on the internet. Such resources can be crypto currencies and stocks. These sources of information can be online news or tweets and other social media sources.
    - heading "pipeline:" [level=4] [ref=e88]
    - paragraph [ref=e89]: Incoming information is parsed and transformed into a computer understandable representation that allows the software to work with it. AI then uses its different machine learning tools to assign meaning to the incoming information and identify the implications for the value of resources that are being monitored. The learning itself is facilitated by the fact that a prediction is made and its correctness can be evaluated as soon as the point in time for which the prediction was made is reached. This way a feedback loop is created and continuous learning is assured by adapting models to minimize the error.
    - heading "potential:" [level=4] [ref=e90]
    - paragraph [ref=e91]: Making predictions like this allows for early detection of negative as well as potentially positive effects that news can have on prices. It is meant as an early warning system and allows its users to trade resources with less of a risk.
