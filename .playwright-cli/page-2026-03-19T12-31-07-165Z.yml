    - img [ref=e37]
    - paragraph [ref=e38]: Kraken/AI reads hundreds of news articles, tweets, etc. in parallel and real time. It compares this data with occurrences and patterns which its machine learning algorithms have learned from historic data and predicts how the affected stock value will change in the near future.
    - paragraph [ref=e39]:
      - text: This allows to
      - text: • aggregate and analyze hundreds of websites, feeds and tweets in one place,
      - text: • anticipate and manage volatility risks early,
      - text: • identify course defining events in advance,
      - text: • minimize risk exposure and protect your assets against losses.
